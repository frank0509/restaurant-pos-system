<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業 KDS 廚房顯示系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; overflow: hidden;}
        .board-container { display: flex; height: calc(100vh - 70px); padding: 10px; gap: 20px; }
        .board-col { flex: 1; background-color: #1e1e1e; border-radius: 10px; padding: 15px; display: flex; flex-direction: column;}
        .board-title { text-align: center; padding-bottom: 10px; border-bottom: 2px solid #555; margin-bottom: 15px; font-weight: bold;}
        .order-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        .order-card { background-color: #2c2c2c; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); animation: fadeIn 0.4s ease-out; }
        .pending-card { border-left: 6px solid #dc3545; } 
        .cooking-card { border-left: 6px solid #ffc107; } 
        .seq-num { font-size: 1.2rem; color: #aaa; }
        .table-num { font-size: 1.8rem; font-weight: bold; color: #fff; margin: 5px 0;}
        .items { font-size: 1.2rem; color: #4CAF50; }
        .btn-action { width: 100%; margin-top: 10px; font-weight: bold; font-size: 1.1rem;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-content { color: #000; }
        #ws-status { font-size: 0.9rem; margin-left: 15px; padding: 3px 8px; border-radius: 15px; }
        .bg-online { background-color: #198754; color: white; }
        .bg-offline { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="d-flex justify-content-between align-items-center p-3 bg-dark">
        <div class="d-flex align-items-center">
            <h2 class="m-0">👨‍🍳 廚房即時接單系統</h2>
            <span id="ws-status" class="bg-offline">連線中...</span>
        </div>
        <button class="btn btn-outline-light" onclick="openHistoryModal()">
            📜 查詢營業報表
        </button>
    </div>

    <div class="board-container">
        <div class="board-col">
            <h4 class="board-title text-danger">📥 待接單</h4>
            <div id="pending-list" class="order-list"></div>
        </div>
        <div class="board-col">
            <h4 class="board-title text-warning">🔥 製作中</h4>
            <div id="cooking-list" class="order-list"></div>
        </div>
    </div>

    <div class="modal fade" id="historyModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold text-dark">📜 營業報表查詢</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex justify-content-between align-items-center mb-3 bg-white p-3 rounded border">
                        <div class="d-flex align-items-center gap-2">
                            <label class="fw-bold text-nowrap">📅 選擇日期：</label>
                            <input type="date" id="history-date" class="form-control" style="width: 180px;">
                            <button class="btn btn-primary" onclick="loadHistory()">查詢</button>
                        </div>
                        <div class="fs-4 fw-bold text-dark">
                            日營收總計: <span class="text-danger">$<span id="daily-revenue">0</span></span>
                        </div>
                    </div>

                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr><th>流水號</th><th>桌號</th><th>時間</th><th>餐點內容</th><th>金額</th><th>狀態</th></tr>
                        </thead>
                        <tbody id="history-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 取得今天的日期，格式為 YYYY-MM-DD
        function getTodayStr() {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
        }

        async function fetchActiveOrders() {
            const res = await fetch('/api/active_orders');
            const orders = await res.json();
            document.getElementById('pending-list').innerHTML = '';
            document.getElementById('cooking-list').innerHTML = '';
            // 因為是撈全部，我們照順序畫出來
            orders.forEach(order => renderCard(order, true));
        }

        // 💡 修改：isInit 決定是加在最下面，還是擠到最上面
        function renderCard(order, isInit = false) {
            const existingCard = document.getElementById(`order-card-${order.id}`);
            if (existingCard) existingCard.remove(); 

            if (order.status === 'done') return; 

            const isPending = order.status === 'pending';
            const container = document.getElementById(isPending ? 'pending-list' : 'cooking-list');
            
            const card = document.createElement('div');
            card.id = `order-card-${order.id}`;
            card.className = `order-card ${isPending ? 'pending-card' : 'cooking-card'}`;
            
            card.innerHTML = `
                <div class="d-flex justify-content-between">
                    <span class="seq-num">#${order.seq}</span>
                    <span class="text-muted">ID: ${order.id}</span>
                </div>
                <div class="table-num">桌號：${order.table}</div>
                <div class="items">${order.items.join('<br>')}</div>
                <hr style="border-color: #555;">
                <button class="btn ${isPending ? 'btn-danger' : 'btn-success'} btn-action" 
                        onclick="updateStatus(${order.id}, '${isPending ? 'cooking' : 'done'}')">
                    ${isPending ? '✅ 接單並開始製作' : '🍽️ 出餐完成'}
                </button>
            `;
            
            // 💡 關鍵修復：新訂單來的時候，強制插在最上方 (prepend)
            if (isInit) {
                container.appendChild(card);
            } else {
                container.prepend(card);
            }
        }

        async function updateStatus(orderId, newStatus) {
            await fetch(`/api/update_status/${orderId}?status=${newStatus}`, { method: 'POST' });
        }

        // 💡 關鍵修復：具備斷線自動重連的 WebSocket
        let ws;
        function connectWebSocket() {
            const statusEl = document.getElementById('ws-status');
            ws = new WebSocket(`ws://${window.location.host}/ws/kitchen`);
            
            ws.onopen = function() {
                statusEl.innerText = "🟢 即時連線正常";
                statusEl.className = "bg-online";
                fetchActiveOrders(); // 連線成功時刷新一下畫面確保沒漏單
            };

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                if (msg.type === "new") {
                    renderCard(msg.data, false); // false = prepend 置頂
                    new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play().catch(()=>{});
                } else if (msg.type === "update") {
                    fetchActiveOrders(); 
                }
            };

            ws.onclose = function() {
                statusEl.innerText = "🔴 連線中斷，重新連線中...";
                statusEl.className = "bg-offline";
                // 3秒後自動嘗試重新連線
                setTimeout(connectWebSocket, 3000);
            };
        }

        // --- 營業報表邏輯 ---
        function openHistoryModal() {
            // 打開時，預設填入今天的日期
            document.getElementById('history-date').value = getTodayStr();
            loadHistory();
            new bootstrap.Modal(document.getElementById('historyModal')).show();
        }

        async function loadHistory() {
            const targetDate = document.getElementById('history-date').value;
            const res = await fetch(`/api/history_orders?target_date=${targetDate}`);
            const orders = await res.json();
            
            let dailyTotal = 0;
            const tbody = document.getElementById('history-table-body');
            tbody.innerHTML = orders.map(o => {
                dailyTotal += o.total; // 加總當日營收
                return `
                <tr>
                    <td>#${o.seq}</td>
                    <td class="fw-bold text-danger fs-5">${o.table}</td>
                    <td>${o.time}</td>
                    <td>${o.items.join(', ')}</td>
                    <td class="fw-bold">$${o.total}</td>
                    <td>${o.status === 'done' ? '<span class="badge bg-success">✅已完成</span>' : '<span class="badge bg-warning text-dark">🔥未完成</span>'}</td>
                </tr>
            `}).join('');
            
            // 更新畫面上方的總額
            document.getElementById('daily-revenue').innerText = dailyTotal;
        }

        // 啟動 WebSocket
        connectWebSocket();
    </script>
</body>
</html>
